aid: descartes
url: https://raw.githubusercontent.com/api-evangelist/descartes/refs/heads/main/apis.yml
name: Descartes Systems Group
kind: company
description: >-
  The Descartes Systems Group is a global logistics and supply chain software
  company whose cloud-based Global Logistics Network connects manufacturers,
  distributors, carriers, brokers, and freight forwarders. Descartes delivers
  its capabilities across a large family of products - real-time freight
  visibility and carrier sourcing (Descartes MacroPoint), customs and
  regulatory compliance and trade content (Descartes CustomsInfo, NetCHB),
  global trade intelligence (Descartes Datamyne), routing and mobile, and B2B
  connectivity and messaging. Descartes exposes APIs on a per-product basis:
  the MacroPoint visibility, capacity, and carrier integration APIs are
  publicly documented (customer credentials required), while trade content,
  trade data, and B2B connectivity APIs are provisioned through the Descartes
  API portal or a sales/contract engagement. Most API access is
  customer/partner-gated rather than open self-service signup.
