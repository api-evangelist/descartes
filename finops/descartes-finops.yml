description: >-
  FinOps view of Descartes API spend. Descartes prices its APIs as part of
  enterprise product subscriptions and contracts rather than as standalone
  metered APIs, so cost allocation follows the product line - MacroPoint
  visibility/capacity (typically driven by tracked-load / shipment volume),
  CustomsInfo trade content and Datamyne trade data (data entitlements), and
  B2B connectivity over the Global Logistics Network (message/connection
  volume). There is no public per-call rate, so unit economics are governed by
  the negotiated contract. Rates are not reconciled here.
notes: >-
  Because pricing is contract-based, the primary cost drivers to track are
  product subscription fees and volume metrics (tracked loads, data records,
  connectivity messages). Confirm meter definitions and rates with Descartes
  during procurement.
