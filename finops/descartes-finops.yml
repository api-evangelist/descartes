meters:
- name: tracked_loads
  description: Shipments/loads tracked through MacroPoint visibility; a primary volume driver for MacroPoint API cost.
  unit: loads
  aggregation: sum
  dimensions:
  - account
  - product
- name: capacity_matches
  description: Carrier capacity matches processed through MacroPoint Capacity Import/Export.
  unit: matches
  aggregation: sum
  dimensions:
  - account
- name: trade_content_records
  description: Trade content lookups / records consumed from CustomsInfo (HS classification, tariff/duty, rulings).
  unit: records
  aggregation: sum
  dimensions:
  - account
- name: trade_data_records
  description: Global trade data records retrieved from Datamyne (bill-of-lading, customs records).
  unit: records
  aggregation: sum
  dimensions:
  - account
- name: connectivity_messages
  description: B2B messages exchanged over the Global Logistics Network.
  unit: messages
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track volume per product (tracked loads, capacity matches, trade content/data records, connectivity messages) since these drive contract cost even without a public per-call rate.
- name: Allocation
  description: Map each Descartes product subscription and its API usage to the business unit or workflow that consumes it.
- name: Optimization
  description: Right-size product subscriptions to actual shipment/data volume; consolidate connectivity onto the Global Logistics Network where it replaces point-to-point EDI.
- name: Accountability
  description: Assign owners per Descartes product line and review annual contract spend against realized volume during renewal.
